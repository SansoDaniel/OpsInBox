# NB: questo compose è SOLO per lo sviluppo locale. La produzione usa un Postgres
# gestito (credenziali via secret manager), non questo file. La password qui ha un
# default dev ma è sovrascrivibile via env (POSTGRES_PASSWORD, es. in un .env non versionato).
services:
  postgres:
    image: postgres:16-alpine
    container_name: opsinbox-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-opsinbox}
      POSTGRES_USER: ${POSTGRES_USER:-opsinbox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opsinbox}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opsinbox"]
      interval: 5s
      timeout: 3s
      retries: 10

  # SMTP di sviluppo: cattura le email di notifica (UI su http://localhost:8025)
  mailpit:
    image: axllent/mailpit
    container_name: opsinbox-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  # WhatsApp via open-wa EasyAPI (profilo opzionale, non parte di default):
  #   docker compose --profile whatsapp up -d
  # Prima esecuzione: docker compose logs -f openwa e scansiona il QR con
  # WhatsApp (Dispositivi collegati). La sessione persiste nel volume.
  openwa:
    image: openwa/wa-automate
    container_name: opsinbox-openwa
    profiles: ["whatsapp"]
    command: "-p 8002 --session-data-path /sessions --disable-spins"
    ports:
      - "8002:8002"
    volumes:
      - openwa-sessions:/sessions

volumes:
  pgdata:
  openwa-sessions:
